<div class="container">
  <form #f="ngForm" autocomplete="off" (ngSubmit)="save(f)">

    <div class="p-grid">
      <div class="p-col-12 title">
          <h1>{{ editing ? 'Edição de' : 'Nova' }} Atividade</h1>
      </div>

      <div class="p-col-12 p-md-6 my-2 p-fluid">
        <label>Tipo</label>
        <p-select [options]="types" placeholder="Selecione" name="type"
        [(ngModel)]="activity.type" #type="ngModel" required></p-select>
      </div>

      <div class="p-col-12 p-md-6 my-2 p-fluid">
        <label class="calendar">Data</label>
        <p-datepicker [style]="{'width':'100%'}" [inputStyle]="{'width':'100%'}" dateFormat="dd/mm/yy"
          [(ngModel)]="activity.date" name="date" #date="ngModel" required>
        </p-datepicker>
        <app-message [control]="date" error="required" text="Informe uma data"></app-message>
      </div>

      <div class="p-col-12 p-md-9 my-2 p-fluid">
        <label>Distância (Km)</label>
        <input pInputText type="number" step="0.1" [(ngModel)]="activity.distance"
          name="distance" #distance="ngModel" required>
        <app-message [control]="distance" error="required" text="Informe uma distância"></app-message>
      </div>
      <div class="p-col-12 p-md-9 my-2 p-fluid">
        <label>Duração (Min)</label>
        <input pInputText type="number" step="1" [(ngModel)]="activity.duration"
          name="duration" #duration="ngModel" required>
        <app-message [control]="duration" error="required" text="Informe uma duração"></app-message>
      </div>

      <div class="p-col-12">
      	<p>
	        <button pButton class="my-2" type="submit" label="Salvar" [disabled]="f.invalid"></button>
          <button pButton type="button" label="Nova" class="p-button-info"
            (click)="new(f)"></button>
        </p>
      </div>
      <div class="p-col-12">
	        <a routerLink="/activities">Voltar para a pesquisa</a>
      </div>
    </div>

  </form>
</div>
